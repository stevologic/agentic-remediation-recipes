# Test the Hugo/Docker build, then deploy the Compose stack on DigitalOcean.
#
# Required GitHub repository secrets:
#   DIGITALOCEAN_HOST
#   DIGITALOCEAN_SSH_PRIVATE_KEY
#
# Optional secrets:
#   DIGITALOCEAN_USER     defaults to root
#   DIGITALOCEAN_PORT     defaults to 22
#   DIGITALOCEAN_APP_DIR  defaults to /opt/security-recipes.ai
#   DIGITALOCEAN_APP_USER defaults to security-recipes
name: Build and deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: digitalocean-deploy
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  HUGO_VERSION: 0.147.6
  HUGO_ENVIRONMENT: production
  TZ: UTC
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go for Hugo modules
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Install Hugo extended
        run: |
          wget -O "${RUNNER_TEMP}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${RUNNER_TEMP}/hugo.deb"

      - name: Compute production baseURL
        id: site
        run: |
          if [ -s "static/CNAME" ]; then
            HOST="$(grep -v '^[[:space:]]*$' static/CNAME | head -n1 | tr -d '[:space:]')"
            BASE_URL="https://${HOST}/"
          else
            BASE_URL="https://security-recipes.ai/"
          fi
          echo "base_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "Using baseURL: ${BASE_URL}"

      - name: Install Hugo modules
        run: hugo mod get -u

      - name: Check chatbot JavaScript syntax
        run: node --check assets/js/ai-chatbot.js

      - name: Build Hugo site
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_PARAMS_REPOURL: "https://github.com/${{ github.repository }}"
          HUGO_PARAMS_AIPROVIDERRELAY: same-origin
        run: hugo --gc --minify --baseURL "${{ steps.site.outputs.base_url }}"

      - name: Check Compose config
        run: docker compose config

      - name: Build Docker images
        env:
          SECURITY_RECIPES_BASE_URL: ${{ steps.site.outputs.base_url }}
          SECURITY_RECIPES_REPO_URL: "https://github.com/${{ github.repository }}"
        run: docker compose build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Validate deployment secrets
        env:
          DIGITALOCEAN_HOST: ${{ secrets.DIGITALOCEAN_HOST }}
          DIGITALOCEAN_SSH_PRIVATE_KEY: ${{ secrets.DIGITALOCEAN_SSH_PRIVATE_KEY }}
        run: |
          test -n "$DIGITALOCEAN_HOST" || { echo "::error::Missing DIGITALOCEAN_HOST secret"; exit 1; }
          test -n "$DIGITALOCEAN_SSH_PRIVATE_KEY" || { echo "::error::Missing DIGITALOCEAN_SSH_PRIVATE_KEY secret"; exit 1; }

      - name: Deploy on droplet
        env:
          DIGITALOCEAN_HOST: ${{ secrets.DIGITALOCEAN_HOST }}
          DIGITALOCEAN_USER: ${{ secrets.DIGITALOCEAN_USER }}
          DIGITALOCEAN_PORT: ${{ secrets.DIGITALOCEAN_PORT }}
          DIGITALOCEAN_APP_DIR: ${{ secrets.DIGITALOCEAN_APP_DIR }}
          DIGITALOCEAN_APP_USER: ${{ secrets.DIGITALOCEAN_APP_USER }}
          DIGITALOCEAN_SSH_PRIVATE_KEY: ${{ secrets.DIGITALOCEAN_SSH_PRIVATE_KEY }}
        run: |
          DO_USER="${DIGITALOCEAN_USER:-root}"
          DO_PORT="${DIGITALOCEAN_PORT:-22}"
          APP_DIR="${DIGITALOCEAN_APP_DIR:-/opt/security-recipes.ai}"
          APP_USER="${DIGITALOCEAN_APP_USER:-security-recipes}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"
          BRANCH="${GITHUB_REF_NAME}"

          install -m 700 -d ~/.ssh
          printf '%s\n' "$DIGITALOCEAN_SSH_PRIVATE_KEY" > ~/.ssh/digitalocean_deploy_key
          chmod 600 ~/.ssh/digitalocean_deploy_key
          ssh-keyscan -p "$DO_PORT" -H "$DIGITALOCEAN_HOST" >> ~/.ssh/known_hosts

          ssh \
            -i ~/.ssh/digitalocean_deploy_key \
            -p "$DO_PORT" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${DO_USER}@${DIGITALOCEAN_HOST}" \
            'bash -s' -- "$APP_DIR" "$BRANCH" "$REPO_URL" "$APP_USER" <<'REMOTE'
          set -Eeuo pipefail

          APP_DIR="$1"
          BRANCH="$2"
          REPO_URL="$3"
          APP_USER="$4"

          cd "$APP_DIR"
          git remote set-url origin "$REPO_URL"
          git fetch --prune origin "$BRANCH"
          git reset --hard "origin/$BRANCH"
          git clean -fd -e .env -e mcp-server.toml

          if id -u "$APP_USER" >/dev/null 2>&1; then
            chown -R "$APP_USER:$APP_USER" "$APP_DIR"
            chmod 750 "$APP_DIR"
            [ ! -f "$APP_DIR/.env" ] || chmod 600 "$APP_DIR/.env"
          fi

          if docker compose version >/dev/null 2>&1; then
            COMPOSE=(docker compose)
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE=(docker-compose)
          else
            echo "Docker Compose is not installed on the droplet." >&2
            exit 1
          fi

          "${COMPOSE[@]}" up -d --build --remove-orphans
          "${COMPOSE[@]}" ps
          docker image prune -f
          REMOTE
