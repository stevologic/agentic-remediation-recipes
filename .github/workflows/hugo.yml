# Test the Hugo and Docker build. Deployment is handled on the server.
name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  HUGO_VERSION: 0.147.6
  HUGO_ENVIRONMENT: production
  TZ: UTC
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Go for Hugo modules
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Install Hugo extended
        run: |
          wget -O "${RUNNER_TEMP}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${RUNNER_TEMP}/hugo.deb"

      - name: Compute production baseURL
        id: site
        run: |
          if [ -s "static/CNAME" ]; then
            HOST="$(grep -v '^[[:space:]]*$' static/CNAME | head -n1 | tr -d '[:space:]')"
            BASE_URL="https://${HOST}/"
          else
            BASE_URL="https://security-recipes.ai/"
          fi
          echo "base_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "Using baseURL: ${BASE_URL}"

      - name: Install Hugo modules
        run: hugo mod get -u

      - name: Check chatbot JavaScript syntax
        run: node --check assets/js/ai-chatbot.js

      - name: Build Hugo site
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_PARAMS_REPOURL: "https://github.com/${{ github.repository }}"
          HUGO_PARAMS_AIPROVIDERRELAY: same-origin
        run: hugo --gc --minify --baseURL "${{ steps.site.outputs.base_url }}"

      - name: Check Compose config
        run: docker compose config

      - name: Build Docker images
        env:
          SECURITY_RECIPES_BASE_URL: ${{ steps.site.outputs.base_url }}
          SECURITY_RECIPES_REPO_URL: "https://github.com/${{ github.repository }}"
        run: docker compose build
