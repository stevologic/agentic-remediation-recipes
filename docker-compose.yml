name: security-recipes

services:
  security-recipes:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_URL: "${SECURITY_RECIPES_BASE_URL:-https://security-recipes.ai/}"
        REPO_URL: "${SECURITY_RECIPES_REPO_URL:-https://github.com/stevologic/security-recipes.ai}"
        CHAT_API_PATH: "${SECURITY_RECIPES_CHAT_API_PATH:-/api/chat}"
    depends_on:
      chatbot-api:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    ports:
      - "${SECURITY_RECIPES_HTTP_PORT:-80}:80"
    restart: unless-stopped

  chatbot-api:
    build:
      context: .
      dockerfile: Dockerfile.chatbot-server
    environment:
      SECURITY_RECIPES_CHAT_PORT: "8000"
      SECURITY_RECIPES_CHAT_TIMEOUT_SECONDS: "${SECURITY_RECIPES_CHAT_TIMEOUT_SECONDS:-90}"
      SECURITY_RECIPES_CHAT_MAX_OUTPUT_TOKENS: "${SECURITY_RECIPES_CHAT_MAX_OUTPUT_TOKENS:-1400}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      XAI_API_KEY: "${XAI_API_KEY:-}"
      GROK_API_KEY: "${GROK_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    expose:
      - "8000"
    restart: unless-stopped

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp-server
    environment:
      RECIPES_MCP_CONFIG: "/app/mcp-server.toml"
      RECIPES_MCP_TRANSPORT: "streamable-http"
      RECIPES_MCP_HOST: "0.0.0.0"
      RECIPES_MCP_PORT: "80"
      RECIPES_MCP_PATH: "/mcp"
      RECIPES_MCP_SOURCE_INDEX_URL: "${RECIPES_MCP_SOURCE_INDEX_URL:-https://security-recipes.ai/recipes-index.json}"
      RECIPES_MCP_ALLOWED_SOURCE_HOSTS: "${RECIPES_MCP_ALLOWED_SOURCE_HOSTS:-security-recipes.ai}"
      RECIPES_MCP_PUBLIC_BASE_URL: "${RECIPES_MCP_PUBLIC_BASE_URL:-https://security-recipes.ai/mcp}"
      RECIPES_MCP_LOG_LEVEL: "${RECIPES_MCP_LOG_LEVEL:-info}"
      RECIPES_MCP_EAGER_REFRESH: "${RECIPES_MCP_EAGER_REFRESH:-false}"
    expose:
      - "80"
    restart: unless-stopped
